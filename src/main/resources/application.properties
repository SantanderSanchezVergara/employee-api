spring.application.name=employee


spring.datasource.url=jdbc:h2:file:./data/employeedb;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=


spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# JWT Configuration
# La clave secreta debe ser mayor a 256 bits para HS256 (64 caracteres)
jwt.secret=3f7b2c1a9e4d8f6c0b5e2a7d4f1c8b3e6a9d2f5c0e7b4a1d8f3c6e9b2a5d7f0
# Expiración: 24 horas en milisegundos
jwt.expiration=86400000